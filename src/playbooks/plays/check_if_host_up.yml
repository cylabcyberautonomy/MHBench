---
- hosts: "{{ host }}"
  gather_facts: no
  remote_user: root

  tasks:
  - name: Wait for bastion SSH port to be reachable
    delegate_to: localhost
    become: no
    wait_for:
      host: "{{ manage_ip }}"
      port: 22
      state: started
      connect_timeout: 10
      sleep: 20
      timeout: 250

  - name: Wait for bastion to accept SSH key
    delegate_to: localhost
    become: no
    changed_when: false
    retries: 15
    delay: 20
    register: bastion_auth_check
    until: bastion_auth_check.rc == 0
    shell: >-
      ssh -i {{ ssh_key_path }}
      -o BatchMode=yes
      -o ConnectTimeout=10
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      root@{{ manage_ip }}
      "echo ok"

  - name: Wait for bastion to reach target SSH port
    delegate_to: localhost
    become: no
    changed_when: false
    retries: 20
    delay: 30
    register: bastion_tcp_check
    until: bastion_tcp_check.rc == 0
    shell: >-
      ssh -i {{ ssh_key_path }}
      -o BatchMode=yes
      -o ConnectTimeout=10
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      root@{{ manage_ip }}
      "nc -z -w 5 {{ ansible_host }} 22"

  - name: Wait for host to go up
    wait_for_connection:
      delay: 0
      timeout: 180

  - name: Gathering facts
    setup: