---
- hosts: "{{ host }}"
  remote_user: root

  tasks:
    - name: Update the System Packages
      apt:
        update_cache: yes

    - name: Create a Tomcat User
      user:
        name: tomcat

    - name: Create a Tomcat Group
      group:
        name: tomcat

    - name: Install JAVA
      apt:
        name: openjdk-11-jdk
        update_cache: yes
        state: present

    - name: Create a Tomcat Directory
      file:
        path: /opt/tomcat
        owner: tomcat
        group: tomcat
        mode: 755
        recurse: yes

    - name: Create a temporary directory
      file:
        path: /tmp/tomcat_extract
        state: directory
        mode: '0755'
      
    - name: Extract archive to temporary location
      unarchive:
        src: "aux_files/apache-tomcat-9.0.83.zip"
        dest: /tmp/tomcat_extract
      
    - name: Copy Tomcat files to final destination
      shell: cp -r /tmp/tomcat_extract/apache-tomcat-9.0.83/* /opt/tomcat/

    - name: Set proper permissions
      file:
        path: /opt/tomcat
        owner: tomcat
        group: tomcat
        mode: '0755'
        recurse: yes

    - name: Cleanup temporary directory
      file:
        path: /tmp/tomcat_extract
        state: absent

    - name: Change ownership of tomcat directory
      file:
        path: /opt/tomcat
        owner: tomcat
        group: tomcat
        mode: "u+rwx,g+rx,o=rx"
        recurse: yes
        state: directory
    
    - name: Copy Tomcat service from local to remote
      copy:
        src: "aux_files/tomcat.service"
        dest: /etc/systemd/system/
        mode: 0755

    - name: Start and Enable Tomcat on sever
      systemd:
        name: tomcat
        state: started
        enabled: true
        daemon_reload: true

    - name: Creates directory
      ansible.builtin.file:
        path: /home/tomcat/.ssh
        state: directory
        owner: tomcat
        group: tomcat
        mode: 0700

    - name: Download Struts 2.3.31 apps archive
      get_url:
        url: https://archive.apache.org/dist/struts/2.3.31/struts-2.3.31-apps.zip
        dest: /tmp/struts-2.3.31-apps.zip

    - name: Extract struts2-showcase WAR from archive
      shell: unzip -j /tmp/struts-2.3.31-apps.zip "struts-2.3.31/apps/struts2-showcase.war" -d /tmp/

    - name: Deploy Struts WAR as ROOT
      copy:
        src: /tmp/struts2-showcase.war
        dest: /opt/tomcat/webapps/ROOT.war
        remote_src: yes
        owner: tomcat
        group: tomcat
        mode: 0644

    - name: Remove default ROOT webapp
      file:
        path: /opt/tomcat/webapps/ROOT
        state: absent

    - name: Cleanup Struts archive
      file:
        path: /tmp/struts-2.3.31-apps.zip
        state: absent

    - name: Restart Tomcat to deploy WAR
      systemd:
        name: tomcat
        state: restarted

    # Touch .ssh/config if it does not exist,
    # Forces openstack snapshot to save information about tomcat user
    - name: ensure file exists
      copy:
        content: ""
        dest: /home/tomcat/.ssh/config
        force: false
        group: tomcat
        owner: tomcat
        mode: 0600
