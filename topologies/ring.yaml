name: ring
description: "Ring topology — single flat network with 25 hosts"

networks:
  - name: ring_network
    description: "Ring network"
    subnets:
      - name: ring_subnet
        cidr: "192.168.200.0/24"
        external: true
        host_groups:
          - vm_type: host
            count: 25
            ip_start: "192.168.200.10"

attacker:
  vm_type: kali_attacker
