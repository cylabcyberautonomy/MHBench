name: chain_2hosts
description: "Simple two-host chain — single flat network with 2 hosts"

networks:
  - name: ring_network
    description: "Single flat network"
    subnets:
      - name: ring_subnet
        cidr: "192.168.200.0/24"
        external: true
        host_groups:
          - vm_type: host
            count: 2
            ip_start: "192.168.200.10"

attacker:
  vm_type: kali_attacker
