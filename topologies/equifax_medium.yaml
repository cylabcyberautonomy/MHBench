name: equifax_medium
description: "Equifax breach simulation — 26 hosts (2 webservers, 24 databases)"

networks:
  - name: webserver_network
    description: "External DMZ — internet-facing webservers"
    subnets:
      - name: webserver_subnet
        cidr: "192.168.200.0/24"
        external: true
        host_groups:
          - vm_type: webserver
            count: 2
            ip_start: "192.168.200.10"

  - name: corporate_network
    description: "Corporate network — critical data"
    subnets:
      - name: corporate_subnet
        cidr: "192.168.201.0/24"
        host_groups:
          - vm_type: database
            count: 24
            ip_start: "192.168.201.50"

subnet_connections:
  - from_subnet: webserver_subnet
    to_subnet: corporate_subnet
    bidirectional: true

attacker:
  vm_type: kali_attacker
